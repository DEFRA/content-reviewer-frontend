# Gitleaks configuration
# https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml

title = "content-reviewer-frontend gitleaks config"

[extend]
# Extend the default ruleset that ships with gitleaks
useDefault = true

# ── Allowlisted findings ──────────────────────────────────────────────────────
# These are documentation / example placeholders that are not real credentials.
# Each entry requires both a description and either a regex or a commit SHA.

[[rules.allowlist]]
description = "SESSION_COOKIE_PASSWORD placeholder in documentation"
regexes = [
  # Matches the placeholder value used in USER_GUIDE.md and .env.example files
  '''your-secret-password-at-least-32-characters'''
]
paths = [
  '''(^|/)USER_GUIDE\.md$''',
  '''(^|/)\.env\.example$''',
  '''(^|/)README\.md$'''
]

[[rules.allowlist]]
description = "Generic minimum-length password placeholder in documentation"
regexes = [
  # Matches any 'the-password-must-be-at-least-32-characters-long' style placeholder
  '''the-password-must-be-at-least-\d+-characters'''
]
paths = [
  '''(^|/)\.env\.example$''',
  '''(^|/)USER_GUIDE\.md$''',
  '''(^|/)README\.md$'''
]
